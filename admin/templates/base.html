<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DB Admin{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ base_path }}/static/style.css">
</head>
<body>
  {% if admin is defined %}
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-icon">◆</span>
        <div>
          <div class="brand-title">DB Platform</div>
          <div class="brand-sub">Multi-tenant</div>
        </div>
      </div>
      <nav>
        <a href="{{ base_path }}/" class="nav-link {% if active == 'dashboard' %}active{% endif %}">
          <span class="nav-icon">▣</span> Dashboard
        </a>
        <a href="{{ base_path }}/databases/new" class="nav-link {% if active == 'new_db' %}active{% endif %}">
          <span class="nav-icon">＋</span> Nieuwe database
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-badge">
          <span class="user-dot"></span>
          {{ admin.username }}
        </div>
        <button type="button" id="logout-btn" class="btn btn-ghost btn-sm btn-block">Uitloggen</button>
      </div>
    </aside>
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
  {% else %}
  {% block bare_content %}{% endblock %}
  {% endif %}

  <div id="modal-overlay" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <h2 id="modal-title" class="modal-title"></h2>
      <p id="modal-message" class="modal-message"></p>
      <div id="modal-extra" class="modal-extra hidden"></div>
      <p id="modal-error" class="error hidden"></p>
      <div class="modal-actions">
        <button type="button" id="modal-cancel" class="btn btn-ghost">Annuleren</button>
        <button type="button" id="modal-confirm" class="btn btn-primary">Bevestigen</button>
      </div>
    </div>
  </div>
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <script>window.DB_BASE = "{{ base_path }}";</script>
  <script src="{{ base_path }}/static/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
